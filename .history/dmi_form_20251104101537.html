<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tasheer DMI – Department Assessment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="assets/css/bootstrap.min.css" rel="stylesheet"> 
  <link href="assets/css/styles.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  

  

  <script src="assets/js/config.js"></script>
  <script src="assets/js/questions_data.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script> 
</head>
<body class="bg-light">
  
  <nav class="navbar navbar-light bg-white shadow-sm px-3 mb-4 sticky-top">
    <div class="container-fluid">
        <span id="deptName" class="navbar-brand fw-semibold text-primary">Digital Maturity Assessment</span>
        <div>
            <span id="saveStatus" class="badge text-bg-success me-3 d-none"></span>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row g-4">
        
        <div class="col-lg-9">
            <h3 class="mb-4 text-secondary">Questionnaire</h3>
            <div id="questionsContainer" class="row g-3">
                </div>
            
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary" onclick="saveDMI(true)">Save Progress</button>
                <button class="btn btn-secondary" onclick="resetDMI()">Reset All</button>
                <button class="btn btn-success" onclick="window.print()">Export to PDF</button>
            </div>
        </div>
        
        <div class="col-lg-3">
            <div class="card live-score-card sticky-top shadow" style="top: 20px;">
                <div class="card-body text-center">
                    <h5 class="card-title text-primary">Live DMI Score</h5>
                    
                    <div class="live-score-chart-container mx-auto position-relative my-3">
                        <canvas id="deptChart"></canvas>
                        <span class="score-percentage-center" id="scorePercentageCenter">0%</span>
                    </div>
                    
                    <p class="mb-1" id="maturityLevelText">Maturity: <strong>N/A</strong></p>
                    <p class="score-status small">
                        <span id="answeredCount">0</span> / <span id="totalQuestions">0</span> Questions Answered
                    </p>
                    <p class="score-status small">
                        Score: <span id="totalScoreText">0</span> / <span id="maxScoreText">0</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="reportSection" class="mt-5 p-4 bg-white shadow-sm print-report">
        <h2 class="text-center text-primary mb-4">Tasheer DMI Final Assessment Report</h2>
        <h3 id="reportDeptName" class="text-center text-secondary mb-4"></h3>

        <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded">
            <div>
                <h5>Overall Maturity Score:</h5>
                <h1 class="text-success display-4" id="reportMaturityScore">0.00%</h1>
            </div>
            <div class="text-end">
                <p class="mb-1">Total Score: <strong id="reportTotalScore">0</strong> / <strong id="reportMaxScore">0</strong></p>
                <div id="reportMaturityLevel"></div>
            </div>
        </div>

        <h4 class="mt-4">Detailed Question Score Breakdown</h4>
        <table class="table table-bordered score-table">
            <thead>
                <tr>
                    <th style="width: 50px;">Q-No.</th>
                    <th>Question</th>
                    <th style="width: 60px; text-align: center;">Score</th>
                    <th style="width: 300px;">Selected Answer</th>
                </tr>
            </thead>
            <tbody id="detailedScoreBody">
                </tbody>
        </table>
    </div>
  </div>

  <script src="assets/js/dmi_form.js"></script>
</body>
</html>
