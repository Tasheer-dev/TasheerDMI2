<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading – Tasheer DMI</title>
    <link rel="stylesheet" href="assets/css/styles.css" />

  <style>
    body {
      margin: 0;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: "Segoe UI", sans-serif;
    }
    .loader-container { text-align: center; }
    .loader-logo img {
      width: 120px;
      animation: fadeIn 1s ease-in-out infinite alternate;
    }
    .spinner {
      margin-top: 25px;
      border: 6px solid #ddd;
      border-top: 6px solid #005baa;
      border-radius: 50%;
      width: 65px; height: 65px;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 15px;
      font-size: 16px;
      color: #005baa;
      font-weight: 500;
    }
    @keyframes spin { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
    @keyframes fadeIn { from{opacity:0.6;}to{opacity:1;} }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="loader-logo"><img src="assets/img/company-logo.png" alt="Tasheer Logo"></div>
    <div class="spinner"></div>
    <div class="loading-text">Loading Tasheer Digital Platform...</div>
  </div>
  <script>
    window.addEventListener("load", () => {
      setTimeout(() => window.location.href = "login.html", 500);
    });
  </script>
</body>
</html>
